<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Air Flow Gallery</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap');
:root{--ink:#172033;--muted:#667085;--line:#e7edf5;--blue:#4ea8ff;--pink:#ff8fb3;--mint:#57d9a3;--yellow:#ffd166;--dark:#27364f;--shadow:0 18px 50px rgba(39,54,79,.12)}
*{box-sizing:border-box} body{margin:0;min-height:100vh;color:var(--ink);font-family:"Noto Sans Thai",system-ui,sans-serif;background:radial-gradient(circle at 8% 0%,#dff3ff 0,transparent 36%),radial-gradient(circle at 92% 8%,#ffe0ec 0,transparent 30%),linear-gradient(180deg,#fbfdff,#eef7ff 70%,#f8fbff)}
body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.42;background-image:radial-gradient(#c6ddf4 1.2px,transparent 1.2px);background-size:24px 24px;mask-image:linear-gradient(black,transparent 82%)}
header{width:min(1220px,94vw);margin:0 auto;padding:20px 0 12px;position:relative}.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;background:rgba(255,255,255,.82);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:26px;padding:12px 14px}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;color:#2563a9}.brand-icon{width:42px;height:42px;border-radius:16px;background:linear-gradient(135deg,#7dd3fc,#ff8fb3);display:grid;place-items:center;color:white;font-size:22px}.nav{display:flex;gap:8px;flex-wrap:wrap}
.nav a{text-decoration:none;border-radius:18px;padding:10px 14px;font-weight:800;background:#eef7ff;color:#2563a9;border:1px solid #d7ecff}.nav a.dark{background:#334155;color:white;border:0}
.hero{margin-top:14px;padding:18px 20px;border-radius:30px;background:linear-gradient(135deg,#ffffff,#f0f9ff);border:1px solid var(--line);box-shadow:var(--shadow);text-align:center}h1{margin:0;font-size:clamp(30px,5vw,52px);line-height:1.12}.hero p{margin:8px 0 0;color:var(--muted);font-weight:500}
.wrap{width:min(1220px,94vw);margin:16px auto 30px;position:relative}.shell{display:grid;grid-template-columns:360px 1fr;gap:16px}.card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:28px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
label{display:block;color:#334155;font-size:14px;font-weight:700;margin-bottom:7px}input,select,textarea{width:100%;border:1px solid #dce7f3;background:#fbfdff;color:var(--ink);border-radius:18px;padding:12px 14px;font-size:15px;outline:none;font-family:inherit}textarea{min-height:100px;resize:vertical;line-height:1.6}
button,.btn{border:0;border-radius:18px;padding:12px 14px;font-weight:800;cursor:pointer;font-family:inherit;font-size:14px;text-decoration:none;text-align:center}.btn-blue{background:linear-gradient(135deg,#7dd3fc,#4ea8ff);color:#08365f}.btn-green{background:linear-gradient(135deg,#86efac,#57d9a3);color:#064e3b}.btn-red{background:linear-gradient(135deg,#ffb4c8,#ff6b91);color:#6b0f2a}.btn-yellow{background:linear-gradient(135deg,#ffe58a,#ffd166);color:#6b4b00}.btn-dark{background:#334155;color:white}
.grid{display:grid;gap:12px}.grid-2{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:1fr 1fr 1fr}.grid-4{grid-template-columns:repeat(4,1fr)}.grid-5{grid-template-columns:repeat(5,1fr)}.small{font-size:12px;color:var(--muted)}.pill{display:inline-block;padding:5px 10px;border-radius:999px;background:#eef8ff;color:#2563a9;border:1px solid #cfeaff;font-size:12px;font-weight:800}.hidden{display:none!important}
table{width:100%;border-collapse:collapse;background:white;border-radius:20px;overflow:hidden}th,td{border-bottom:1px solid #e9eef5;padding:10px;text-align:left;vertical-align:top;font-size:14px}th{background:#f2f8ff;color:#2563a9}img.thumb{width:160px;max-height:110px;object-fit:contain;background:white;border-radius:14px;border:1px solid #e7edf5}.actions{display:flex;gap:6px;flex-wrap:wrap}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}.gallery-card{background:white;border:1px solid var(--line);border-radius:24px;padding:12px;box-shadow:0 10px 24px rgba(39,54,79,.08)}.gallery-card img{width:100%;height:170px;object-fit:contain;background:#f8fbff;border-radius:18px;border:1px solid #e7edf5}.gallery-card h3{margin:8px 0 3px}.score{font-size:24px;font-weight:900;color:#16a34a}.modal{position:fixed;inset:0;background:rgba(15,23,42,.82);display:none;z-index:10;padding:24px}.modal.show{display:grid;place-items:center}.modal-box{width:min(1100px,96vw);max-height:92vh;overflow:auto;background:white;border-radius:28px;padding:18px}.modal-img{width:100%;max-height:70vh;object-fit:contain;background:#f8fbff;border-radius:20px}
@media(max-width:950px){.shell,.grid-2,.grid-3,.grid-4,.grid-5{grid-template-columns:1fr}table{display:block;overflow-x:auto}}
.present{position:fixed;inset:0;background:#020617;z-index:20;display:none;color:white;padding:20px}.present.show{display:grid;grid-template-columns:1fr 360px;gap:18px}.present img{width:100%;height:calc(100vh - 40px);object-fit:contain;background:white;border-radius:24px}.present .sidep{background:#111827;border-radius:24px;padding:18px;overflow:auto}@media(max-width:900px){.present.show{grid-template-columns:1fr}}</style></head><body>
<header><div class="topbar"><div class="brand"><div class="brand-icon">🖼️</div><div>Air Flow Gallery<br><span class="small">ดูผลงานและผลประเมิน</span></div></div><div class="nav"><a href="index.html">💨 หน้ากิจกรรม</a><a class="dark" href="admin.html">🔐 หน้าครู</a></div></div><div class="hero"><h1>แกลเลอรีผลงาน</h1><p>นักเรียนสามารถดูผลงานกลุ่ม ผลประเมินของครู และกดนำเสนอหน้าชั้นเรียน</p></div></header>
<main class="wrap"><section class="card"><div class="grid grid-3"><select id="groupFilter"><option value="">ทุกกลุ่ม</option></select><select id="missionFilter"><option value="">ทุกด่าน</option><option value="1">ด่าน 1</option><option value="2">ด่าน 2</option><option value="3">ด่าน 3</option><option value="4">ด่าน 4</option><option value="5">ด่าน 5</option></select><button class="btn-blue" onclick="loadWorks()">โหลดผลงาน</button></div></section><div id="galleryBox"></div></main>
<div id="present" class="present"><img id="pImg"><div class="sidep"><button class="btn-red" onclick="closePresent()">ปิด</button><div id="pInfo"></div></div></div>
<script>
const CFG=window.APP_CONFIG;const sb=supabase.createClient(CFG.SUPABASE_URL,CFG.SUPABASE_ANON_KEY);let groups=[],works=[];
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
async function init(){const g=await sb.from("student_groups").select("*").order("sort_order").order("group_name");groups=g.data||[];document.getElementById("groupFilter").innerHTML='<option value="">ทุกกลุ่ม</option>'+groups.map(x=>`<option value="${x.id}">${esc(x.group_name)}</option>`).join("");loadWorks()}
async function loadWorks(){let q=sb.from("submissions").select("*").order("created_at",{ascending:false});const gid=document.getElementById("groupFilter").value,m=document.getElementById("missionFilter").value;if(gid)q=q.eq("group_id",gid);if(m)q=q.eq("mission_no",Number(m));const r=await q;works=r.data||[];render()}
function render(){const box=document.getElementById("galleryBox");if(!works.length){box.innerHTML='<section class="card">ยังไม่มีผลงาน</section>';return}const map={};works.forEach(w=>{(map[w.group_name] ||= []).push(w)});box.innerHTML=Object.entries(map).map(([g,items])=>`<section class="card"><h2>${esc(g)}</h2><div class="gallery">${items.map(w=>`<div class="gallery-card"><img src="${w.image_url}"><h3>ด่าน ${w.mission_no}</h3><p>${esc((w.explanation||"").slice(0,100))}</p><div class="score">${w.score??"-"} คะแนน</div><p class="small">${esc(w.teacher_comment||"ยังไม่มีความเห็นครู")}</p><button class="btn-blue" onclick="present('${w.id}')">นำเสนอหน้าชั้น</button></div>`).join("")}</div></section>`).join("")}
function present(id){const w=works.find(x=>x.id===id);document.getElementById("pImg").src=w.image_url;document.getElementById("pInfo").innerHTML=`<h1>${esc(w.group_name)} | ด่าน ${w.mission_no}</h1><h2>คำอธิบาย</h2><p>${esc(w.explanation||"")}</p><h2>สมาชิก</h2><pre>${esc(w.members||"")}</pre><h2>ผลประเมิน</h2><div class="score">${w.score??"-"} คะแนน</div><p>${esc(w.teacher_comment||"ยังไม่มีความเห็นครู")}</p>`;document.getElementById("present").classList.add("show")}
function closePresent(){document.getElementById("present").classList.remove("show")}
init();
</script></body></html>
