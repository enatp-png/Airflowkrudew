<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Flow Mission | Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#020617;color:#e5e7eb} header{padding:18px;text-align:center;background:linear-gradient(135deg,#075985,#0f172a);border-bottom:1px solid rgba(148,163,184,.25)} h1{margin:0;font-size:clamp(24px,4vw,38px)} p{color:#cbd5e1}.wrap{width:min(1250px,96vw);margin:18px auto}.card{background:#0f172a;border:1px solid rgba(148,163,184,.25);border-radius:18px;padding:14px;margin-bottom:14px}.filters{display:grid;grid-template-columns:repeat(5,1fr);gap:10px} input,select,textarea{width:100%;border:1px solid rgba(148,163,184,.35);background:#020617;color:#e5e7eb;border-radius:12px;padding:10px 12px;font-size:15px} textarea{min-height:70px} button{border:0;border-radius:12px;padding:10px 12px;font-weight:800;cursor:pointer}.btn-blue{background:#38bdf8;color:#082f49}.btn-green{background:#22c55e;color:#052e16}.btn-red{background:#ef4444;color:#450a0a}.btn-yellow{background:#facc15;color:#422006}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}.stat{background:#111827;border:1px solid rgba(148,163,184,.18);padding:12px;border-radius:16px;text-align:center}.stat b{font-size:28px;color:#7dd3fc;display:block} table{width:100%;border-collapse:collapse;background:#0b1120;border-radius:16px;overflow:hidden} th,td{border-bottom:1px solid rgba(148,163,184,.18);padding:10px;text-align:left;vertical-align:top;font-size:14px} th{background:#111827;color:#bae6fd} img.thumb{width:130px;max-height:90px;object-fit:contain;border-radius:10px;background:white}.login{width:min(420px,94vw);margin:50px auto}.hidden{display:none}.small{font-size:12px;color:#94a3b8}.actions{display:flex;gap:6px;flex-wrap:wrap}@media(max-width:900px){.filters,.stats{grid-template-columns:1fr 1fr} img.thumb{width:90px}}
  </style>
</head>
<body>
<header><h1>Air Flow Mission Admin</h1><p>ดูผลงาน ให้คะแนน และส่งออกข้อมูลนักเรียน</p></header>
<div id="loginBox" class="card login"><h2>เข้าสู่ระบบครู</h2><p class="small">ใส่รหัสครูที่ตั้งไว้ใน config.js</p><input id="pin" type="password" placeholder="รหัสครู"><br><br><button class="btn-blue" onclick="login()">เข้าสู่ระบบ</button></div>
<main id="app" class="wrap hidden">
  <section class="card"><div class="filters"><select id="classFilter"><option value="">ทุกห้อง</option><option>4/2</option><option>4/4</option><option>4/6</option><option>4/8</option><option>4/10</option><option>6/6</option><option>6/7</option></select><select id="missionFilter"><option value="">ทุกด่าน</option><option value="1">ด่าน 1</option><option value="2">ด่าน 2</option><option value="3">ด่าน 3</option><option value="4">ด่าน 4</option><option value="5">ด่าน 5</option></select><input id="searchBox" placeholder="ค้นหาชื่อ / เลขที่"><button class="btn-blue" onclick="loadData()">โหลดข้อมูล</button><button class="btn-green" onclick="exportCSV()">ส่งออก CSV</button></div></section>
  <section class="stats" id="stats"></section>
  <section class="card"><div id="tableBox">กำลังโหลด...</div></section>
</main>
<script>
const CFG=window.APP_CONFIG;const sb=supabase.createClient(CFG.SUPABASE_URL,CFG.SUPABASE_ANON_KEY);let rows=[];
function login(){const pin=document.getElementById('pin').value;if(pin===CFG.TEACHER_PIN){localStorage.setItem('airflow-admin-ok','1');document.getElementById('loginBox').classList.add('hidden');document.getElementById('app').classList.remove('hidden');loadData()}else alert('รหัสไม่ถูกต้อง')}
if(localStorage.getItem('airflow-admin-ok')==='1'){document.getElementById('loginBox').classList.add('hidden');document.getElementById('app').classList.remove('hidden');loadData()}
async function loadData(){let q=sb.from('submissions').select('*').order('created_at',{ascending:false});const c=document.getElementById('classFilter').value,m=document.getElementById('missionFilter').value;if(c)q=q.eq('classroom',c);if(m)q=q.eq('mission_no',Number(m));const {data,error}=await q;if(error){document.getElementById('tableBox').innerHTML='โหลดไม่สำเร็จ: '+error.message;return}const s=document.getElementById('searchBox').value.trim().toLowerCase();rows=(data||[]).filter(r=>!s||(r.student_name||'').toLowerCase().includes(s)||String(r.student_no||'').includes(s));renderStats();renderTable()}
function renderStats(){const total=rows.length,done5=rows.filter(r=>r.mission_no===5).length,scored=rows.filter(r=>r.score!==null&&r.score!==undefined).length,avg=scored?(rows.reduce((a,r)=>a+(Number(r.score)||0),0)/scored).toFixed(2):'-',unique=new Set(rows.map(r=>`${r.classroom}-${r.student_no}-${r.student_name}`)).size;document.getElementById('stats').innerHTML=[['ผลงานทั้งหมด',total],['นักเรียน',unique],['ส่งด่าน 5',done5],['ตรวจแล้ว',scored],['คะแนนเฉลี่ย',avg]].map(x=>`<div class="stat"><b>${x[1]}</b><span>${x[0]}</span></div>`).join('')}
function renderTable(){if(!rows.length){document.getElementById('tableBox').innerHTML='ยังไม่มีข้อมูล';return}document.getElementById('tableBox').innerHTML=`<table><thead><tr><th>เวลา</th><th>นักเรียน</th><th>ด่าน</th><th>คำอธิบาย</th><th>ภาพ</th><th>คะแนน/ความเห็น</th><th>จัดการ</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${fmtDate(r.created_at)}</td><td><b>${esc(r.student_name)}</b><br><span class="small">${esc(r.classroom)} เลขที่ ${esc(r.student_no||'')}</span></td><td>ด่าน ${r.mission_no}</td><td>${esc(r.explanation||'')}</td><td>${r.image_url?`<a href="${r.image_url}" target="_blank"><img class="thumb" src="${r.image_url}"></a>`:'-'}</td><td><input id="score-${r.id}" type="number" step="0.5" min="0" max="10" value="${r.score??''}" placeholder="คะแนน"><textarea id="comment-${r.id}" placeholder="ความเห็นครู">${esc(r.teacher_comment||'')}</textarea></td><td><div class="actions"><button class="btn-green" onclick="saveScore('${r.id}')">บันทึกคะแนน</button><button class="btn-red" onclick="deleteRow('${r.id}','${escAttr(r.image_path||'')}')">ลบ</button></div></td></tr>`).join('')}</tbody></table>`}
async function saveScore(id){const score=document.getElementById(`score-${id}`).value,teacher_comment=document.getElementById(`comment-${id}`).value;const {error}=await sb.from('submissions').update({score:score===''?null:Number(score),teacher_comment}).eq('id',id);if(error)alert('บันทึกไม่สำเร็จ: '+error.message);else{alert('บันทึกคะแนนแล้ว');loadData()}}
async function deleteRow(id,path){if(!confirm('ยืนยันลบผลงานนี้?'))return;if(path)await sb.storage.from(CFG.STORAGE_BUCKET).remove([path]);const {error}=await sb.from('submissions').delete().eq('id',id);if(error)alert('ลบไม่สำเร็จ: '+error.message);else loadData()}
function exportCSV(){const headers=['เวลา','ชื่อ','ห้อง','เลขที่','ด่าน','คำอธิบาย','คะแนน','ความเห็นครู','ภาพ'];const lines=[headers.join(',')];rows.forEach(r=>{lines.push([r.created_at,r.student_name,r.classroom,r.student_no,r.mission_no,r.explanation,r.score??'',r.teacher_comment??'',r.image_url??''].map(csv).join(','))});const blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='airflow-submissions.csv';a.click()}
function csv(v){return `"${String(v??'').replaceAll('"','""')}"`}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function escAttr(s){return String(s??'').replace(/'/g,'&#039;').replace(/"/g,'&quot;')}function fmtDate(d){return new Date(d).toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'})}
</script>
</body>
</html>
