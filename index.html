<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Flow Mission | นักเรียน</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    :root{--bg:#020617;--card:#0f172a;--text:#e5e7eb;--muted:#94a3b8;--blue:#38bdf8;--green:#22c55e;--red:#ef4444;--yellow:#facc15;--orange:#fb923c}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top,#1d4ed8 0,#0f172a 38%,#020617 100%);color:var(--text);min-height:100vh}
    header{text-align:center;padding:18px 12px 8px} h1{margin:0;font-size:clamp(24px,5vw,42px)} header p{margin:6px 0;color:#cbd5e1}
    .app{width:min(1200px,96vw);margin:0 auto 28px;display:grid;grid-template-columns:330px 1fr;gap:14px}
    .panel,.stage{background:rgba(15,23,42,.92);border:1px solid rgba(148,163,184,.25);border-radius:22px;box-shadow:0 20px 70px rgba(0,0,0,.35)} .panel{padding:15px}
    label{font-size:13px;color:#cbd5e1;margin-bottom:5px;display:block} input,select,textarea{width:100%;border:1px solid rgba(148,163,184,.35);background:#020617;color:var(--text);border-radius:12px;padding:10px 12px;font-size:15px;outline:none} textarea{min-height:90px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.field{margin-bottom:10px}.missions{display:grid;gap:8px;margin:10px 0 14px}
    .mission{border:1px solid rgba(148,163,184,.22);background:#111827;color:var(--text);padding:10px;border-radius:14px;text-align:left;cursor:pointer}.mission.active{border-color:var(--blue);background:linear-gradient(135deg,#075985,#0f172a)}.mission.locked{opacity:.45;filter:grayscale(1);cursor:not-allowed}.mission small{display:block;color:#cbd5e1;margin-top:2px}
    button{border:0;border-radius:12px;padding:10px 12px;font-weight:800;cursor:pointer}.btn-blue{background:var(--blue);color:#082f49}.btn-green{background:var(--green);color:#052e16}.btn-red{background:var(--red);color:#450a0a}.btn-yellow{background:var(--yellow);color:#422006}.btn-gray{background:#334155;color:#f8fafc}
    .tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.color-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 12px}.color-btn{width:38px;height:38px;border-radius:50%;border:3px solid transparent}.color-btn.active{border-color:white}
    .stage{overflow:hidden}.stage-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;border-bottom:1px solid rgba(148,163,184,.18)}.stage-head h2{margin:0;font-size:22px}.stage-head p{margin:4px 0 0;color:var(--muted)}.badge{background:#082f49;color:#bae6fd;border:1px solid rgba(56,189,248,.35);border-radius:999px;padding:7px 10px;white-space:nowrap;font-size:13px}
    .canvas-wrap{position:relative;margin:14px auto;width:min(900px,96%);aspect-ratio:16/10;background:#e0f2fe;border-radius:18px;overflow:hidden;touch-action:none;border:1px solid rgba(226,232,240,.35)} canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}#bgCanvas{z-index:1}#drawCanvas{z-index:2}
    .info-grid{width:min(900px,96%);margin:0 auto 14px;display:grid;grid-template-columns:1fr 1fr;gap:12px}.info-card{background:rgba(30,41,59,.9);border:1px solid rgba(148,163,184,.18);border-radius:16px;padding:12px;font-size:14px;line-height:1.55}.answer{width:min(900px,96%);margin:0 auto 18px}.alert{display:none;margin-top:10px;padding:11px;border-radius:14px;background:#052e16;color:#dcfce7;border:1px solid rgba(34,197,94,.4)}.map-upload{display:none}.map-upload.show{display:block}.note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:10px}.progress{height:10px;background:#334155;border-radius:99px;overflow:hidden;margin:8px 0 12px}.bar{height:100%;width:0;background:linear-gradient(90deg,#22c55e,#38bdf8)}.loading{opacity:.6;pointer-events:none}
    @media(max-width:900px){.app{grid-template-columns:1fr}.info-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><h1>Air Flow Mission</h1><p>ฝึกวาดเส้นการเคลื่อนที่ของอากาศ จากสถานการณ์จำลองสู่แผนที่อากาศจริง</p></header>
<main class="app">
  <aside class="panel">
    <div class="field"><label>ห้องเรียน</label><select id="classroom"><option value="">เลือกห้อง</option><option>4/2</option><option>4/4</option><option>4/6</option><option>4/8</option><option>4/10</option><option>6/6</option><option>6/7</option></select></div>
    <div class="row"><div class="field"><label>เลขที่</label><input id="studentNo" placeholder="เช่น 12"></div><div class="field"><label>รหัสนักเรียน</label><input id="studentCode" placeholder="ไม่บังคับ"></div></div>
    <div class="field"><label>ชื่อ-สกุล</label><input id="studentName" placeholder="ชื่อ-สกุลนักเรียน"></div>
    <div class="progress"><div class="bar" id="progressBar"></div></div><label>เลือกด่าน</label><div class="missions" id="missionList"></div>
    <label>สีเส้น</label><div class="color-row"><button class="color-btn active" data-color="#ef4444" style="background:#ef4444"></button><button class="color-btn" data-color="#2563eb" style="background:#2563eb"></button><button class="color-btn" data-color="#16a34a" style="background:#16a34a"></button><button class="color-btn" data-color="#facc15" style="background:#facc15"></button><button class="color-btn" data-color="#111827" style="background:#111827"></button></div>
    <div class="field"><label>ความหนาเส้น: <span id="sizeText">5</span></label><input id="brushSize" type="range" min="2" max="18" value="5"></div>
    <div class="map-upload" id="mapUploadBox"><label>ด่าน 5: อัปโหลดแผนที่อากาศจริง</label><input id="mapUpload" type="file" accept="image/*"><div class="note">ดาวน์โหลดภาพแผนที่อากาศจากกรมอุตุนิยมวิทยา แล้วนำมาอัปโหลดตรงนี้</div></div>
    <div class="tools"><button class="btn-gray" id="undoBtn">ย้อนกลับ</button><button class="btn-red" id="clearBtn">ล้างภาพ</button><button class="btn-yellow" id="downloadBtn">บันทึก PNG</button><button class="btn-green" id="submitBtn">ส่งเข้า Supabase</button></div>
    <div class="note">หลังส่ง ระบบจะอัปโหลดภาพไปยัง Supabase Storage และบันทึกข้อมูลลงตาราง submissions</div>
  </aside>
  <section class="stage">
    <div class="stage-head"><div><h2 id="missionTitle"></h2><p id="missionDesc"></p></div><div class="badge" id="missionBadge"></div></div>
    <div class="canvas-wrap" id="canvasWrap"><canvas id="bgCanvas"></canvas><canvas id="drawCanvas"></canvas></div>
    <div class="info-grid"><div class="info-card"><b>ภารกิจ</b><div id="taskText"></div></div><div class="info-card"><b>หลักคิดวิทยาศาสตร์</b><div id="scienceText"></div></div></div>
    <div class="answer"><label>คำอธิบายของนักเรียน</label><textarea id="explanation" placeholder="อธิบายว่าอากาศเคลื่อนที่จากบริเวณใดไปบริเวณใด เพราะอะไร"></textarea><div class="alert" id="alertBox"></div></div>
  </section>
</main>
<script>
const CFG=window.APP_CONFIG;const sb=supabase.createClient(CFG.SUPABASE_URL,CFG.SUPABASE_ANON_KEY);
const missions=[{id:1,title:"ด่าน 1: อากาศร้อน–อากาศเย็น",badge:"ง่าย",desc:"พิจารณาภาพ แล้ววาดทิศทางการเคลื่อนที่ของอากาศ",task:"สังเกตบริเวณที่มีอากาศร้อนและอากาศเย็น แล้ววาดลูกศรแสดงทิศทางการเคลื่อนที่ของอากาศตามความเข้าใจ",science:"ให้นักเรียนใช้ความรู้เรื่องอุณหภูมิ ความหนาแน่น และการเคลื่อนที่ของอากาศมาช่วยตัดสินใจ",drawBg:drawLevel1},{id:2,title:"ด่าน 2: ความกดอากาศสูง–ต่ำ",badge:"พื้นฐาน",desc:"พิจารณาบริเวณ H และ L แล้ววาดทิศทางลม",task:"วิเคราะห์ตำแหน่งความกดอากาศสูง H และความกดอากาศต่ำ L แล้ววาดเส้นทางการเคลื่อนที่ของอากาศ",science:"ให้นักเรียนใช้ความสัมพันธ์ระหว่างความกดอากาศกับทิศทางลมในการอธิบายคำตอบ",drawBg:drawLevel2},{id:3,title:"ด่าน 3: แผนที่จำลองประเทศไทย",badge:"ปานกลาง",desc:"ใช้แผนที่จำลองเพื่อคาดการณ์ทิศทางลม",task:"พิจารณาตำแหน่ง H และ L รอบประเทศไทย แล้ววาดเส้นลมหลักที่น่าจะมีผลต่อประเทศไทย",science:"เมื่อทราบตำแหน่งของระบบความกดอากาศ นักเรียนสามารถสร้างแบบจำลองทิศทางการเคลื่อนที่ของมวลอากาศได้",drawBg:drawLevel3},{id:4,title:"ด่าน 4: สถานการณ์กึ่งจริง",badge:"ท้าทาย",desc:"วิเคราะห์หลายระบบความกดอากาศพร้อมกัน",task:"วาดทิศทางลมหลัก และระบุบริเวณที่คาดว่าอากาศอาจยกตัวหรือเกิดเมฆฝน",science:"บริเวณที่ลมมาบรรจบกัน หรือมีอากาศยกตัว มักสัมพันธ์กับการเกิดเมฆและฝน",drawBg:drawLevel4},{id:5,title:"ด่าน 5: แผนที่อากาศจริง",badge:"ประยุกต์ใช้จริง",desc:"ใช้ภาพแผนที่อากาศจริงจากกรมอุตุนิยมวิทยา",task:"อัปโหลดแผนที่อากาศจริง แล้ววาดเส้นการเคลื่อนที่ของอากาศ พร้อมอธิบายผลต่อสภาพอากาศ",science:"การอ่านแผนที่อากาศจริงช่วยเชื่อมโยงความรู้เรื่องความกดอากาศ ลม และสภาพอากาศในชีวิตประจำวัน",drawBg:drawLevel5}];
let currentMission=0,brushColor="#ef4444",brushSize=5,drawing=false,last=null,history=[],unlocked=1;const bgCanvas=document.getElementById("bgCanvas"),drawCanvas=document.getElementById("drawCanvas"),wrap=document.getElementById("canvasWrap");const bg=bgCanvas.getContext("2d"),ctx=drawCanvas.getContext("2d");
function alertMsg(msg,ok=true){const el=document.getElementById("alertBox");el.style.display="block";el.style.background=ok?"#052e16":"#450a0a";el.style.color=ok?"#dcfce7":"#fee2e2";el.innerHTML=msg}function setLoading(v){document.body.classList.toggle("loading",v)}
function buildMissionList(){const list=document.getElementById("missionList");list.innerHTML="";missions.forEach((m,i)=>{const b=document.createElement("button");b.className="mission"+(i===currentMission?" active":"")+(m.id>unlocked?" locked":"");b.innerHTML=`<b>${m.title}</b><small>${m.desc}</small>`;b.onclick=()=>{if(m.id<=unlocked)loadMission(i);else alertMsg("ต้องส่งด่านก่อนหน้าให้เรียบร้อยก่อน จึงจะปลดล็อกด่านนี้",false)};list.appendChild(b)});document.getElementById("progressBar").style.width=((unlocked-1)/4*100)+"%"}
function loadMission(i){currentMission=i;document.getElementById("missionTitle").textContent=missions[i].title;document.getElementById("missionDesc").textContent=missions[i].desc;document.getElementById("missionBadge").textContent=missions[i].badge;document.getElementById("taskText").textContent=missions[i].task;document.getElementById("scienceText").textContent=missions[i].science;document.getElementById("mapUploadBox").classList.toggle("show",missions[i].id===5);document.getElementById("explanation").value="";document.getElementById("alertBox").style.display="none";clearDraw();redrawBackground();buildMissionList()}
function setupCanvas(){const rect=wrap.getBoundingClientRect(),dpr=window.devicePixelRatio||1;[bgCanvas,drawCanvas].forEach(c=>{c.width=rect.width*dpr;c.height=rect.height*dpr;c.style.width=rect.width+"px";c.style.height=rect.height+"px"});bg.setTransform(dpr,0,0,dpr,0,0);ctx.setTransform(dpr,0,0,dpr,0,0);redrawBackground()}function redrawBackground(){bg.clearRect(0,0,bgCanvas.clientWidth,bgCanvas.clientHeight);missions[currentMission].drawBg()}function clearDraw(){ctx.clearRect(0,0,drawCanvas.clientWidth,drawCanvas.clientHeight);history=[]}function saveHistory(){history.push(drawCanvas.toDataURL());if(history.length>30)history.shift()}function undo(){if(!history.length){clearDraw();return}const img=new Image();img.onload=()=>{ctx.clearRect(0,0,drawCanvas.clientWidth,drawCanvas.clientHeight);ctx.drawImage(img,0,0,drawCanvas.clientWidth,drawCanvas.clientHeight)};img.src=history.pop()}function getPos(e){const r=drawCanvas.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}function startDraw(e){e.preventDefault();saveHistory();drawing=true;last=getPos(e)}function moveDraw(e){if(!drawing)return;e.preventDefault();const p=getPos(e);ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle=brushColor;ctx.lineWidth=brushSize;ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();drawArrowHead(last.x,last.y,p.x,p.y);last=p}function endDraw(){drawing=false;last=null}function drawArrowHead(x1,y1,x2,y2){const angle=Math.atan2(y2-y1,x2-x1),len=Math.max(10,brushSize*2.2);ctx.fillStyle=brushColor;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-len*Math.cos(angle-Math.PI/7),y2-len*Math.sin(angle-Math.PI/7));ctx.lineTo(x2-len*Math.cos(angle+Math.PI/7),y2-len*Math.sin(angle+Math.PI/7));ctx.closePath();ctx.fill()}function combinedCanvas(){const temp=document.createElement("canvas");temp.width=bgCanvas.width;temp.height=bgCanvas.height;const t=temp.getContext("2d");t.drawImage(bgCanvas,0,0);t.drawImage(drawCanvas,0,0);return temp}function downloadPNG(){const temp=combinedCanvas();const link=document.createElement("a");link.download=`airflow-mission-${missions[currentMission].id}.png`;link.href=temp.toDataURL("image/png");link.click()}
function safeAscii(v){return String(v||"unknown").trim().replace(/\//g,"-").replace(/[^a-zA-Z0-9_-]/g,"").slice(0,40)||"unknown"}
function makeSafeFilePath(classroom,missionId,studentNo){const cls=safeAscii(classroom);const no=safeAscii(studentNo);const rand=Math.random().toString(36).slice(2,8);return `${cls}/mission-${missionId}/${Date.now()}-${no}-${rand}.png`}
async function submitAnswer(){const student_name=document.getElementById("studentName").value.trim(),classroom=document.getElementById("classroom").value.trim(),student_no=document.getElementById("studentNo").value.trim(),explanation=document.getElementById("explanation").value.trim();if(!student_name||!classroom||!student_no){alertMsg("กรุณากรอก ห้อง เลขที่ และชื่อ-สกุล ให้ครบ",false);return}if(!explanation){alertMsg("กรุณาเขียนคำอธิบายก่อนส่งคำตอบ",false);return}try{setLoading(true);const temp=combinedCanvas();const blob=await new Promise(resolve=>temp.toBlob(resolve,"image/png",0.95));const filePath=makeSafeFilePath(classroom,missions[currentMission].id,student_no);const up=await sb.storage.from(CFG.STORAGE_BUCKET).upload(filePath,blob,{contentType:"image/png",upsert:false});if(up.error)throw up.error;const pub=sb.storage.from(CFG.STORAGE_BUCKET).getPublicUrl(filePath);const image_url=pub.data.publicUrl;const ins=await sb.from("submissions").insert({student_name,classroom,student_no,mission_no:missions[currentMission].id,explanation,image_path:filePath,image_url}).select().single();if(ins.error)throw ins.error;if(unlocked<5&&missions[currentMission].id===unlocked)unlocked++;localStorage.setItem(`airflow-unlocked-${classroom}-${student_no}-${student_name}`,String(unlocked));buildMissionList();alertMsg(`ส่งคำตอบสำเร็จ ✅<br>บันทึกด่านที่ ${missions[currentMission].id} ลง Supabase แล้ว<br>ปลดล็อกด่านถัดไปแล้ว`);if(currentMission<missions.length-1){loadMission(currentMission+1)}}catch(err){console.error(err);alertMsg("ส่งไม่สำเร็จ: "+(err.message||err),false)}finally{setLoading(false)}}
function tryLoadProgress(){const n=document.getElementById("studentName").value.trim(),c=document.getElementById("classroom").value.trim(),no=document.getElementById("studentNo").value.trim();const v=localStorage.getItem(`airflow-unlocked-${c}-${no}-${n}`);unlocked=v?Math.max(1,Math.min(5,Number(v))):1;if(currentMission+1>unlocked)currentMission=unlocked-1;loadMission(currentMission)}["studentName","classroom","studentNo"].forEach(id=>document.getElementById(id).addEventListener("change",tryLoadProgress));
function drawText(text,x,y,size=24,color="#0f172a",align="center"){bg.fillStyle=color;bg.font=`800 ${size}px system-ui`;bg.textAlign=align;bg.textBaseline="middle";bg.fillText(text,x,y)}function roundRect(c,x,y,w,h,r,fill,stroke){c.beginPath();c.roundRect(x,y,w,h,r);if(fill){c.fillStyle=fill;c.fill()}if(stroke){c.strokeStyle=stroke;c.lineWidth=2;c.stroke()}}
function drawLevel1(){const w=bgCanvas.clientWidth,h=bgCanvas.clientHeight,grd=bg.createLinearGradient(0,0,w,h);grd.addColorStop(0,"#fecaca");grd.addColorStop(.5,"#e0f2fe");grd.addColorStop(1,"#bfdbfe");bg.fillStyle=grd;bg.fillRect(0,0,w,h);roundRect(bg,w*.1,h*.18,w*.32,h*.55,24,"rgba(239,68,68,.18)","#ef4444");roundRect(bg,w*.58,h*.18,w*.32,h*.55,24,"rgba(37,99,235,.18)","#2563eb");drawText("บริเวณ A",w*.26,h*.22,20,"#7f1d1d");drawText("อากาศร้อน",w*.26,h*.34,30,"#991b1b");drawText("ให้นักเรียนวาดทิศทาง",w*.26,h*.49,18,"#7f1d1d");drawText("การเคลื่อนที่ของอากาศ",w*.26,h*.56,18,"#7f1d1d");drawText("บริเวณ B",w*.74,h*.22,20,"#1e3a8a");drawText("อากาศเย็น",w*.74,h*.34,30,"#1e3a8a");drawText("ให้นักเรียนวาดทิศทาง",w*.74,h*.49,18,"#1e40af");drawText("การเคลื่อนที่ของอากาศ",w*.74,h*.56,18,"#1e40af");bg.fillStyle="#78350f";bg.fillRect(w*.08,h*.76,w*.84,14);drawText("พื้นผิวโลก",w*.5,h*.83,22,"#334155")}
function drawLevel2(){const w=bgCanvas.clientWidth,h=bgCanvas.clientHeight;bg.fillStyle="#e0f2fe";bg.fillRect(0,0,w,h);bg.strokeStyle="#94a3b8";bg.lineWidth=2;for(let i=1;i<6;i++){bg.beginPath();bg.moveTo(0,h*i/6);bg.lineTo(w,h*i/6);bg.stroke();bg.beginPath();bg.moveTo(w*i/6,0);bg.lineTo(w*i/6,h);bg.stroke()}bg.beginPath();bg.arc(w*.24,h*.5,72,0,Math.PI*2);bg.fillStyle="#bfdbfe";bg.fill();bg.strokeStyle="#2563eb";bg.lineWidth=5;bg.stroke();drawText("H",w*.24,h*.48,64,"#1d4ed8");drawText("ความกดอากาศสูง",w*.24,h*.62,18,"#1e40af");bg.beginPath();bg.arc(w*.76,h*.5,72,0,Math.PI*2);bg.fillStyle="#fecaca";bg.fill();bg.strokeStyle="#dc2626";bg.lineWidth=5;bg.stroke();drawText("L",w*.76,h*.48,64,"#b91c1c");drawText("ความกดอากาศต่ำ",w*.76,h*.62,18,"#991b1b");drawText("ภารกิจ: วาดทิศทางลมจาก H ไป L",w*.5,h*.14,26,"#0f172a")}
function drawThailandSimple(x,y,s){bg.fillStyle="#bbf7d0";bg.strokeStyle="#166534";bg.lineWidth=3;bg.beginPath();bg.moveTo(x+s*.42,y);bg.bezierCurveTo(x+s*.2,y+s*.1,x+s*.28,y+s*.32,x+s*.35,y+s*.42);bg.bezierCurveTo(x+s*.48,y+s*.58,x+s*.28,y+s*.8,x+s*.5,y+s);bg.bezierCurveTo(x+s*.66,y+s*.75,x+s*.6,y+s*.56,x+s*.72,y+s*.38);bg.bezierCurveTo(x+s*.82,y+s*.2,x+s*.62,y+s*.06,x+s*.42,y);bg.fill();bg.stroke()}function drawLevel3(){const w=bgCanvas.clientWidth,h=bgCanvas.clientHeight;bg.fillStyle="#dff6ff";bg.fillRect(0,0,w,h);drawThailandSimple(w*.38,h*.13,h*.68);drawText("H",w*.18,h*.28,62,"#1d4ed8");drawText("จีนตอนใต้",w*.18,h*.39,18,"#1e40af");drawText("L",w*.76,h*.62,62,"#b91c1c");drawText("ทะเลจีนใต้",w*.76,h*.73,18,"#991b1b");bg.strokeStyle="#64748b";bg.setLineDash([8,8]);bg.lineWidth=3;bg.beginPath();bg.moveTo(w*.05,h*.5);bg.quadraticCurveTo(w*.5,h*.3,w*.95,h*.55);bg.stroke();bg.setLineDash([]);drawText("แผนที่จำลอง",w*.5,h*.08,28,"#0f172a")}function drawLevel4(){const w=bgCanvas.clientWidth,h=bgCanvas.clientHeight;bg.fillStyle="#e0f2fe";bg.fillRect(0,0,w,h);drawThailandSimple(w*.39,h*.12,h*.7);[{t:"H",x:.18,y:.2,c:"#1d4ed8",label:"มวลอากาศเย็น"},{t:"L",x:.75,y:.27,c:"#b91c1c",label:"หย่อมความกดต่ำ"},{t:"L",x:.28,y:.78,c:"#b91c1c",label:"ทะเลอันดามัน"},{t:"H",x:.84,y:.78,c:"#1d4ed8",label:"แปซิฟิก"}].forEach(o=>{bg.beginPath();bg.arc(w*o.x,h*o.y,46,0,Math.PI*2);bg.fillStyle=o.t==="H"?"#bfdbfe":"#fecaca";bg.fill();bg.strokeStyle=o.c;bg.lineWidth=4;bg.stroke();drawText(o.t,w*o.x,h*o.y,42,o.c);drawText(o.label,w*o.x,h*o.y+62,15,o.c)});bg.strokeStyle="#f59e0b";bg.lineWidth=4;bg.setLineDash([10,8]);bg.beginPath();bg.moveTo(w*.18,h*.58);bg.bezierCurveTo(w*.35,h*.45,w*.55,h*.48,w*.75,h*.58);bg.stroke();bg.setLineDash([]);drawText("แนวลมบรรจบโดยประมาณ",w*.5,h*.66,18,"#92400e")}function drawLevel5(){const w=bgCanvas.clientWidth,h=bgCanvas.clientHeight;bg.fillStyle="#cbd5e1";bg.fillRect(0,0,w,h);drawText("ด่าน 5",w/2,h*.28,34,"#0f172a");drawText("อัปโหลดภาพแผนที่อากาศจริงจากกรมอุตุนิยมวิทยา",w/2,h*.4,20,"#0f172a");drawText("แล้ววาดเส้นการเคลื่อนที่ของอากาศบนภาพ",w/2,h*.48,20,"#0f172a");bg.strokeStyle="#475569";bg.lineWidth=3;bg.setLineDash([10,10]);bg.strokeRect(w*.12,h*.15,w*.76,h*.62);bg.setLineDash([])}
document.querySelectorAll(".color-btn").forEach(btn=>btn.onclick=()=>{document.querySelectorAll(".color-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");brushColor=btn.dataset.color});document.getElementById("brushSize").oninput=e=>{brushSize=Number(e.target.value);document.getElementById("sizeText").textContent=brushSize};document.getElementById("undoBtn").onclick=undo;document.getElementById("clearBtn").onclick=clearDraw;document.getElementById("downloadBtn").onclick=downloadPNG;document.getElementById("submitBtn").onclick=submitAnswer;drawCanvas.addEventListener("mousedown",startDraw);drawCanvas.addEventListener("mousemove",moveDraw);window.addEventListener("mouseup",endDraw);drawCanvas.addEventListener("touchstart",startDraw,{passive:false});drawCanvas.addEventListener("touchmove",moveDraw,{passive:false});window.addEventListener("touchend",endDraw);document.getElementById("mapUpload").addEventListener("change",e=>{const file=e.target.files[0];if(!file)return;const img=new Image();img.onload=()=>{const w=bgCanvas.clientWidth,h=bgCanvas.clientHeight;bg.clearRect(0,0,w,h);bg.fillStyle="#fff";bg.fillRect(0,0,w,h);const scale=Math.min(w/img.width,h/img.height),iw=img.width*scale,ih=img.height*scale,x=(w-iw)/2,y=(h-ih)/2;bg.drawImage(img,x,y,iw,ih);clearDraw()};img.src=URL.createObjectURL(file)});window.addEventListener("resize",setupCanvas);buildMissionList();setupCanvas();loadMission(0);
